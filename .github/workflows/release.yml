name: Release Agent Binary

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: burnwatch-darwin-arm64
          - target: bun-darwin-x64
            os: macos-latest
            artifact: burnwatch-darwin-x64
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: burnwatch-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          cd apps/agent
          bun build --compile --target=${{ matrix.target }} --outfile ../../dist/${{ matrix.artifact }} src/index.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/burnwatch-darwin-arm64
            dist/burnwatch-darwin-x64
            dist/burnwatch-linux-x64
